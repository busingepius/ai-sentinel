server.port=8080

# ai-sentinel
ai.sentinel.enabled=true
ai.sentinel.mode=ENFORCE
ai.sentinel.exclude-paths=/actuator/**,/health,/health/**,/favicon.ico
# Log verbosity: FULL | ANOMALY_ONLY | SAMPLED | NONE (default: ANOMALY_ONLY for less noise)
ai.sentinel.telemetry.log-verbosity=ANOMALY_ONLY
ai.sentinel.telemetry.log-score-threshold=0.4
ai.sentinel.telemetry.log-sample-rate=100

# Prometheus metrics
management.endpoints.web.exposure.include=health,info,prometheus,sentinel
management.endpoint.sentinel.enabled=true
management.endpoint.health.show-details=when-authorized
